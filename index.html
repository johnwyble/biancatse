<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Loading…</title>
<meta name="description" content="" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<style>
  /* ---- Base reset ---- */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --primary:#152243; --secondary:#5A7A96; --accent:#C2993E;
    --background:#F7F6F2; --surface:#FFFFFF; --text:#222; --text-light:#FFF; --text-muted:#5C5C5C;
    --font-head:Georgia,serif; --font-body:system-ui,sans-serif;
    --space:clamp(4rem,9vw,8rem);
    --maxw:1180px;
  }
  html{scroll-behavior:smooth}
  body{font-family:var(--font-body);color:var(--text);background:var(--background);line-height:1.65;-webkit-font-smoothing:antialiased}
  h1,h2,h3,h4{font-family:var(--font-head);line-height:1.12;color:var(--primary);font-weight:700}
  img{max-width:100%;display:block}
  a{color:inherit}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 clamp(1.2rem,4vw,2.5rem)}
  .section{padding:var(--space) 0}
  .eyebrow{font-family:var(--font-body);text-transform:uppercase;letter-spacing:.18em;font-size:.78rem;font-weight:700;color:var(--accent);margin-bottom:1rem}
  .btn{display:inline-block;font-family:var(--font-body);font-weight:700;text-decoration:none;padding:.9rem 1.9rem;border-radius:4px;font-size:.95rem;letter-spacing:.02em;transition:transform .15s ease,box-shadow .15s ease,background .15s ease;cursor:pointer;border:none}
  .btn-primary{background:var(--accent);color:var(--primary)}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(0,0,0,.18)}
  .btn-outline{background:transparent;color:var(--text-light);border:2px solid var(--text-light)}
  .btn-outline:hover{background:var(--text-light);color:var(--primary)}
  .btn-ghost{background:transparent;color:var(--primary);border:2px solid var(--primary)}
  .btn-ghost:hover{background:var(--primary);color:var(--text-light)}

  /* ---- Nav ---- */
  header#nav{position:fixed;top:0;left:0;right:0;z-index:100;transition:background .3s ease,box-shadow .3s ease,padding .3s ease;padding:1.1rem 0}
  header#nav .wrap{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem}
  .nav-links{margin-top:.2rem}
  .nav-logo{display:flex;flex-direction:column;align-items:flex-start;gap:.3rem;text-decoration:none;font-family:var(--font-head);font-weight:700;font-size:1.15rem;line-height:1;color:var(--text-light);transition:color .3s ease}
  .nav-logo img{height:168px;width:auto;max-width:70vw;display:block}
  .nav-links{display:flex;align-items:center;gap:2rem;list-style:none}
  .nav-links a{text-decoration:none;font-weight:600;font-size:.95rem;color:var(--text-light);transition:color .2s ease;position:relative}
  .nav-links a:hover{color:var(--accent)}
  header#nav.solid,header#nav.scrolled{background:var(--primary);box-shadow:0 2px 16px rgba(0,0,0,.15);padding:.7rem 0}
  header#nav.light .nav-logo,header#nav.light .nav-links a{color:var(--primary)}
  header#nav.light.scrolled .nav-logo,header#nav.light.scrolled .nav-links a{color:var(--text-light)}
  .nav-cta{padding:.6rem 1.4rem;font-size:.9rem}
  .nav-toggle{display:none;background:none;border:none;cursor:pointer;flex-direction:column;gap:5px;padding:.4rem}
  .nav-toggle span{width:26px;height:2px;background:var(--text-light);transition:.3s}
  header#nav.light .nav-toggle span{background:var(--primary)}
  header#nav.scrolled .nav-toggle span{background:var(--text-light)}

  /* ---- Hero ---- */
  .hero{position:relative;color:var(--text-light)}
  .hero .eyebrow{color:var(--accent)}
  .hero-tagline{font-family:var(--font-body);font-weight:700;text-transform:uppercase;letter-spacing:.14em;font-size:.95rem;color:var(--accent);margin-bottom:1.2rem}
  .hero h1{font-size:clamp(2.6rem,6vw,4.6rem);margin-bottom:1.3rem;color:inherit}
  .hero p.lead{font-size:clamp(1.1rem,2vw,1.35rem);max-width:38ch;margin-bottom:2rem;color:inherit;font-weight:400;opacity:.95}
  .hero-ctas{display:flex;flex-wrap:wrap;gap:1rem}
  /* full-bleed */
  .hero.full-bleed{min-height:100vh;display:flex;align-items:center;background-size:cover;background-position:center}
  .hero.full-bleed::before{content:"";position:absolute;inset:0;background:linear-gradient(120deg,rgba(21,34,67,.92) 0%,rgba(21,34,67,.55) 60%,rgba(21,34,67,.25) 100%)}
  .hero.full-bleed .wrap{position:relative;z-index:2;padding-top:7rem;padding-bottom:4rem}
  .hero.full-bleed .hero-inner{max-width:640px}
  /* split */
  .hero.split{display:grid;grid-template-columns:1fr 1fr;min-height:100vh}
  .hero.split .hero-copy{background:var(--primary);display:flex;align-items:center;padding:7rem clamp(1.5rem,4vw,4rem) 4rem}
  .hero.split .hero-copy .hero-inner{max-width:520px}
  .hero.split .hero-photo{background-size:cover;background-position:center}
  .hero.split.split-right{grid-template-columns:1fr 1fr}
  .hero.split.split-right .hero-copy{order:2}
  .hero.split.split-right .hero-photo{order:1}
  /* centered */
  .hero.centered{min-height:92vh;display:flex;align-items:center;text-align:center;background:linear-gradient(160deg,var(--primary),var(--secondary))}
  .hero.centered .hero-inner{max-width:760px;margin:0 auto;padding-top:6rem}
  .hero.centered .hero-ctas{justify-content:center}
  /* diagonal */
  .hero.diagonal{min-height:100vh;display:grid;grid-template-columns:1.05fr .95fr;background:var(--primary)}
  .hero.diagonal .hero-copy{display:flex;align-items:center;padding:7rem clamp(1.5rem,4vw,4rem) 4rem;z-index:2}
  .hero.diagonal .hero-photo{background-size:cover;background-position:center;clip-path:polygon(18% 0,100% 0,100% 100%,0 100%)}

  /* ---- About ---- */
  .about-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(2rem,5vw,4.5rem);align-items:center}
  .about-copy h2{font-size:clamp(2rem,4vw,3rem);margin-bottom:1.4rem}
  .about-copy p{margin-bottom:1.15rem;color:var(--text)}
  .about-photo-wrap figure{margin:0}
  .about-photo-wrap img{width:100%;object-fit:cover;box-shadow:0 20px 50px rgba(21,34,67,.18)}
  figcaption{font-size:.85rem;color:var(--text-muted);margin-top:.7rem;font-style:italic}
  .pt-rounded-corners img{border-radius:10px}
  .pt-rounded img{border-radius:50%;aspect-ratio:1/1}
  .pt-square img{border-radius:4px;aspect-ratio:4/5}

  /* ---- Issues ---- */
  .issues-head{text-align:center;max-width:720px;margin:0 auto clamp(2.5rem,5vw,4rem)}
  .issues-head h2{font-size:clamp(2rem,4vw,3rem);margin-bottom:1rem}
  .issues-head p{color:var(--text-muted);font-size:1.1rem}
  .issue-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.6rem}
  .issue-card{background:var(--surface);border-radius:10px;padding:2.2rem 2rem;box-shadow:0 4px 24px rgba(21,34,67,.07);border-top:4px solid var(--accent);transition:transform .2s ease,box-shadow .2s ease}
  .issue-card:hover{transform:translateY(-5px);box-shadow:0 14px 38px rgba(21,34,67,.14)}
  .issue-icon{font-size:2rem;margin-bottom:1rem;display:block}
  .issue-card h3{font-size:1.35rem;margin-bottom:.7rem}
  .issue-card p{color:var(--text-muted);font-size:1rem}

  /* ---- Endorsements (exact recreation of endorsements-section.html) ---- */
  #endorsements{background:#FFFFFF;padding:0}
  .endorsements-section{max-width:960px;margin:0 auto;padding:60px 24px;text-align:center;color:#333333}
  .section-label{font-family:'Playfair Display','Times New Roman',Georgia,serif;font-style:italic;color:#C2993E;font-size:16px;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
  .endorsements-section .section-title{font-family:Arial,'Helvetica Neue',sans-serif;font-size:32px;font-weight:800;text-transform:uppercase;color:#152243;letter-spacing:3px;margin-bottom:8px}
  .gold-rule{width:80px;height:3px;background:#C2993E;margin:16px auto 12px;border:none}
  .section-subtitle{font-family:'Playfair Display','Times New Roman',Georgia,serif;font-style:italic;color:#5A7A96;font-size:17px;margin-bottom:48px;line-height:1.5}
  .category-header{font-family:Arial,'Helvetica Neue',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;color:#C2993E;letter-spacing:3px;margin-bottom:20px;margin-top:48px}
  .category-header:first-of-type{margin-top:0}
  .endorsement-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px;margin-bottom:24px}
  .endorsement-grid-bottom{display:grid;grid-template-columns:repeat(2,minmax(260px,1fr));gap:24px;max-width:580px;margin:0 auto 24px}
  .endorsement-grid-single{display:grid;grid-template-columns:minmax(260px,340px);gap:24px;justify-content:center;margin:0 auto 24px}
  .endorsement-card{background:#152243;border-radius:6px;padding:32px 24px;position:relative;overflow:hidden;transition:transform 0.2s ease,box-shadow 0.2s ease}
  .endorsement-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(21,34,67,0.25)}
  .endorsement-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:#C2993E}
  .card-icon{display:flex;align-items:center;justify-content:center;width:44px;height:44px;margin:0 auto 20px;border-radius:50%;background:rgba(194,153,62,0.15)}
  .card-icon svg{width:22px;height:22px;fill:#C2993E}
  .endorser-name{font-family:Arial,'Helvetica Neue',sans-serif;font-size:18px;font-weight:700;color:#FFFFFF;text-transform:uppercase;letter-spacing:1px;line-height:1.3;margin-bottom:12px}
  .endorser-title{font-family:'Playfair Display','Times New Roman',Georgia,serif;font-style:italic;font-size:14px;color:#C2993E;line-height:1.5}
  .logo-plate{background:#FFFFFF;border-radius:8px;padding:16px 18px;margin:0 auto 18px;max-width:210px;min-height:86px;display:flex;align-items:center;justify-content:center}
  .logo-plate img{max-width:100%;max-height:58px;width:auto;height:auto;display:block}
  @media (max-width:640px){
    .endorsements-section{padding:40px 16px}
    .endorsements-section .section-title{font-size:24px;letter-spacing:2px}
    .endorsement-grid,.endorsement-grid-bottom,.endorsement-grid-single{grid-template-columns:1fr;max-width:100%}
    .endorsement-card{padding:24px 20px}
    .endorser-name{font-size:16px}
  }

  /* ---- Forms ---- */
  .forms-head{text-align:center;max-width:680px;margin:0 auto clamp(2rem,4vw,3rem)}
  .forms-head h2{font-size:clamp(2rem,4vw,3rem);margin-bottom:1rem}
  .forms-head p{color:var(--text-muted);font-size:1.1rem}
  .forms-grid{display:grid;gap:2rem;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));align-items:start}
  .form-block{background:var(--surface);border-radius:12px;padding:clamp(1.8rem,3vw,2.6rem);box-shadow:0 8px 34px rgba(21,34,67,.09)}
  .form-block h3{font-size:1.5rem;margin-bottom:.4rem}
  .form-block .f-intro{color:var(--text-muted);margin-bottom:1.6rem}
  .field{margin-bottom:1.15rem}
  .field label{display:block;font-weight:600;font-size:.9rem;margin-bottom:.4rem;color:var(--text)}
  .field input,.field textarea,.field select{width:100%;padding:.8rem .9rem;border:1.5px solid #d8d8d0;border-radius:6px;font:inherit;font-size:1rem;background:var(--background);color:var(--text)}
  .field textarea{min-height:120px;resize:vertical}
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(194,153,62,.18)}
  .form-block .btn{width:100%;margin-top:.5rem}
  .form-success{display:none;background:rgba(90,122,150,.12);border:1.5px solid var(--secondary);color:var(--primary);padding:1rem;border-radius:8px;margin-top:1rem;font-weight:600}

  /* ---- Footer ---- */
  footer{background:var(--primary);color:var(--text-light);padding:3.5rem 0 2rem}
  footer .foot-grid{display:flex;flex-wrap:wrap;justify-content:space-between;gap:2rem;align-items:flex-start}
  footer .foot-brand{font-family:var(--font-head);font-size:1.4rem;margin-bottom:.6rem}
  footer a{color:var(--text-light);text-decoration:none;opacity:.9}
  footer a:hover{opacity:1;color:var(--accent)}
  .foot-links{display:flex;gap:1.4rem;flex-wrap:wrap;margin-top:.6rem}
  .foot-social{display:flex;gap:1rem;margin-top:.4rem}
  .foot-social a{font-size:1.3rem}
  .foot-legal{border-top:1px solid rgba(255,255,255,.18);margin-top:2.2rem;padding-top:1.4rem;font-size:.82rem;opacity:.75;line-height:1.6}

  /* ---- Responsive ---- */
  @media(max-width:860px){
    .nav-links{position:fixed;inset:0 0 0 auto;width:min(78vw,320px);background:var(--primary);flex-direction:column;justify-content:center;gap:2rem;transform:translateX(100%);transition:transform .3s ease;box-shadow:-8px 0 30px rgba(0,0,0,.25)}
    .nav-links.open{transform:translateX(0)}
    .nav-links a{color:var(--text-light);font-size:1.2rem}
    .nav-toggle{display:flex;z-index:110}
    .nav-logo img{height:88px}
    .hero.split,.hero.diagonal{grid-template-columns:1fr}
    .hero.split .hero-photo,.hero.diagonal .hero-photo{min-height:52vh;clip-path:none;order:0}
    .hero.split.split-right .hero-photo{order:0}
    .hero.split .hero-copy,.hero.diagonal .hero-copy{padding-top:10.5rem;padding-bottom:3.5rem}
    .about-grid{grid-template-columns:1fr}
    .about-photo-wrap{order:-1}
  }
</style>
</head>
<body>
<!-- Hidden Netlify form registrations -->
<form name="volunteer" netlify netlify-honeypot="bot-field" hidden>
  <input type="text" name="firstName" /><input type="text" name="lastName" />
  <input type="email" name="email" /><input type="tel" name="phone" />
  <select name="helpWith"><option></option></select><textarea name="message"></textarea>
</form>
<form name="contact" netlify netlify-honeypot="bot-field" hidden>
  <input type="text" name="name" /><input type="email" name="email" /><textarea name="message"></textarea>
</form>

<header id="nav"><div class="wrap">
  <a class="nav-logo" id="navLogo" href="#top"></a>
  <button class="nav-toggle" id="navToggle" aria-label="Menu"><span></span><span></span><span></span></button>
  <ul class="nav-links" id="navLinks"></ul>
</div></header>

<main id="top"></main>
<footer id="footer"></footer>

<script>
/* =========================================================
   CCS Campaign Website — config-driven template engine
   Renders everything from site-config.json
   ========================================================= */
const FONT_MAP = {
  "playfair-source":{head:"'Playfair Display',Georgia,serif",body:"'Source Sans 3',system-ui,sans-serif",g:"Playfair+Display:wght@500;600;700&family=Source+Sans+3:wght@400;600;700"},
  "oswald-merriweather":{head:"'Oswald',sans-serif",body:"'Merriweather',Georgia,serif",g:"Oswald:wght@500;600;700&family=Merriweather:wght@400;700"},
  "dmserif-dmsans":{head:"'DM Serif Display',Georgia,serif",body:"'DM Sans',system-ui,sans-serif",g:"DM+Serif+Display&family=DM+Sans:wght@400;500;700"},
  "bebas-opensans":{head:"'Bebas Neue',sans-serif",body:"'Open Sans',system-ui,sans-serif",g:"Bebas+Neue&family=Open+Sans:wght@400;600;700"},
  "cormorant-fira":{head:"'Cormorant Garamond',Georgia,serif",body:"'Fira Sans',system-ui,sans-serif",g:"Cormorant+Garamond:wght@500;600;700&family=Fira+Sans:wght@400;500;700"},
  "sora-baskerville":{head:"'Sora',sans-serif",body:"'Libre Baskerville',Georgia,serif",g:"Sora:wght@500;600;700&family=Libre+Baskerville:wght@400;700"},
  "archivo-worksans":{head:"'Archivo Black',sans-serif",body:"'Work Sans',system-ui,sans-serif",g:"Archivo+Black&family=Work+Sans:wght@400;500;700"},
  "fraunces-commissioner":{head:"'Fraunces',Georgia,serif",body:"'Commissioner',system-ui,sans-serif",g:"Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Commissioner:wght@400;500;700"},
  "outfit-lora":{head:"'Outfit',sans-serif",body:"'Lora',Georgia,serif",g:"Outfit:wght@500;600;700&family=Lora:wght@400;500;600"},
  "vollkorn-karla":{head:"'Vollkorn',Georgia,serif",body:"'Karla',system-ui,sans-serif",g:"Vollkorn:wght@500;600;700&family=Karla:wght@400;500;700"}
};
const SPACING = {compact:"clamp(3rem,6vw,5rem)",default:"clamp(4rem,9vw,8rem)",generous:"clamp(6rem,12vw,11rem)"};
const esc = s => (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const paras = t => (t||"").split("\n").filter(p=>p.trim()).map(p=>`<p>${esc(p.trim())}</p>`).join("");
const initials = n => (n||"").split(/\s+/).slice(0,2).map(w=>w[0]||"").join("").toUpperCase();

function applyStyle(cfg){
  const s = cfg.style||{}; const c = s.colors||{}; const root=document.documentElement.style;
  const cmap={primary:"--primary",secondary:"--secondary",accent:"--accent",background:"--background",surface:"--surface",text:"--text",textLight:"--text-light",textMuted:"--text-muted"};
  Object.keys(cmap).forEach(k=>{if(c[k])root.setProperty(cmap[k],c[k]);});
  const f = FONT_MAP[s.fontPairing]||FONT_MAP["playfair-source"];
  root.setProperty("--font-head",f.head); root.setProperty("--font-body",f.body);
  const link=document.createElement("link"); link.rel="stylesheet";
  link.href=`https://fonts.googleapis.com/css2?family=${f.g}&display=swap`; document.head.appendChild(link);
  root.setProperty("--space", SPACING[s.sectionSpacing]||SPACING.default);
}

function renderNav(cfg){
  const nav=cfg.nav||{}, header=document.getElementById("nav");
  const logo=document.getElementById("navLogo");
  logo.href="#top";
  logo.innerHTML = `<span>${esc(nav.logoText||cfg.site.candidateName||"")}</span>` + (nav.logo?`<img src="${esc(nav.logo)}" alt="${esc(cfg.site.candidateName||'')} campaign logo"/>`:"");
  const ul=document.getElementById("navLinks");
  const links=(nav.links||[]).map(l=>`<li><a href="${esc(l.href)}">${esc(l.label)}</a></li>`).join("");
  const cta = nav.ctaText?`<li><a class="btn btn-primary nav-cta" href="${esc(nav.ctaLink||'#')}" target="_blank" rel="noopener">${esc(nav.ctaText)}</a></li>`:"";
  ul.innerHTML = links+cta;
  if((cfg.style&&cfg.style.navStyle)==="solid") header.classList.add("solid");
  const hero0=(cfg.sectionOrder||[])[0];
  if((cfg.style&&cfg.style.heroLayout)==="split-left"||(cfg.style&&cfg.style.heroLayout)==="split-right"||hero0!=="hero"){/*keep light text on dark copy panel*/}
  // toggle
  const t=document.getElementById("navToggle");
  t.addEventListener("click",()=>ul.classList.toggle("open"));
  ul.querySelectorAll("a").forEach(a=>a.addEventListener("click",()=>ul.classList.remove("open")));
  const onScroll=()=>{ if(window.scrollY>60) header.classList.add("scrolled"); else header.classList.remove("scrolled"); };
  window.addEventListener("scroll",onScroll); onScroll();
}

function heroHTML(cfg){
  const h=cfg.hero||{}, layout=(cfg.style&&cfg.style.heroLayout)||"split-left";
  const pos = esc(h.imagePosition||"center");
  const tagline = h.tagline||cfg.site.tagline||"";
  const inner = `
    <div class="hero-inner">
      ${tagline?`<div class="hero-tagline">${esc(tagline)}</div>`:""}
      <h1>${esc(h.headline||cfg.site.candidateName||"")}</h1>
      ${h.subhead?`<p class="lead">${esc(h.subhead)}</p>`:""}
      <div class="hero-ctas">
        ${h.ctaText?`<a class="btn btn-primary" href="${esc(h.ctaLink||'#')}" ${/^https?:/.test(h.ctaLink||'')?'target="_blank" rel="noopener"':''}>${esc(h.ctaText)}</a>`:""}
        ${h.secondaryCta?`<a class="btn btn-outline" href="${esc(h.secondaryCtaLink||'#about')}">${esc(h.secondaryCta)}</a>`:""}
      </div>
    </div>`;
  if(layout==="full-bleed"){
    return `<section class="hero full-bleed" style="background-image:url('${esc(h.image||'')}');background-position:${pos}"><div class="wrap">${inner}</div></section>`;
  }
  if(layout==="centered"){
    return `<section class="hero centered"><div class="wrap">${inner}</div></section>`;
  }
  if(layout==="diagonal"){
    return `<section class="hero diagonal"><div class="hero-copy"><div class="wrap" style="padding:0">${inner}</div></div><div class="hero-photo" style="background-image:url('${esc(h.image||'')}');background-position:${pos}"></div></section>`;
  }
  const rightClass = layout==="split-right"?" split-right":"";
  return `<section class="hero split${rightClass}"><div class="hero-copy"><div class="wrap" style="padding:0">${inner}</div></div><div class="hero-photo" style="background-image:url('${esc(h.image||'')}');background-position:${pos}"></div></section>`;
}

function aboutHTML(cfg){
  const a=cfg.about; if(!a) return "";
  const pt = (cfg.style&&cfg.style.photoTreatment)||"rounded-corners";
  const photo = a.photo?`<div class="about-photo-wrap pt-${pt}"><figure><img src="${esc(a.photo)}" alt="${esc(cfg.site.candidateName||'')}"/>${a.photoCaption?`<figcaption>${esc(a.photoCaption)}</figcaption>`:""}</figure></div>`:"";
  return `<section class="section" id="about"><div class="wrap"><div class="about-grid">
    <div class="about-copy">
      ${a.sectionTitle?`<div class="eyebrow">${esc(a.sectionTitle)}</div>`:""}
      <h2>${esc(a.headline||"")}</h2>
      ${paras(a.body)}
    </div>
    ${photo}
  </div></div></section>`;
}

function issuesHTML(cfg){
  const s=cfg.issues; if(!s||!(s.items||[]).length) return "";
  const cards=s.items.map(it=>`<div class="issue-card">
    ${it.icon?`<span class="issue-icon">${esc(it.icon)}</span>`:""}
    <h3>${esc(it.title)}</h3><p>${esc(it.description)}</p></div>`).join("");
  return `<section class="section" id="issues" style="background:var(--background)"><div class="wrap">
    <div class="issues-head">${s.sectionTitle?`<div class="eyebrow">${esc(s.sectionTitle)}</div>`:""}
      <h2>${esc(s.headline||"")}</h2>${s.intro?`<p>${esc(s.intro)}</p>`:""}</div>
    <div class="issue-cards">${cards}</div></div></section>`;
}

const ENDORSE_ICONS={
  gavel:'M1 21h12v2H1v-2zm3.3-4.29l1.29-1.29 1.42 1.42-1.3 1.29a1 1 0 01-1.41 0 1 1 0 010-1.42zm6.58-6.58l5.3-5.29a1 1 0 011.41 0l1.42 1.41a1 1 0 010 1.42l-5.3 5.29-2.83-2.83zm-2.12 2.12L6.64 14.37a1 1 0 000 1.42l1.42 1.41a1 1 0 001.41 0l2.12-2.12-2.83-2.83z',
  check:'M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z',
  star:'M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z'
};
const iconSVG=name=>ENDORSE_ICONS[name]?`<div class="card-icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="${ENDORSE_ICONS[name]}"/></svg></div>`:"";
const brify=t=>(t==null?"":String(t)).split("\n").map(esc).join("<br>");
function chunk3(arr){const out=[];for(let i=0;i<arr.length;i+=3)out.push(arr.slice(i,i+3));return out;}

function endorsementCard(item,logo){
  if(logo){
    return `<div class="endorsement-card">
      <div class="logo-plate"><img src="${esc(item.logo)}" alt="${esc(item.name)} logo"></div>
      <div class="endorser-name">${esc(item.name)}</div>
    </div>`;
  }
  return `<div class="endorsement-card">
    ${iconSVG(item.icon)}
    <div class="endorser-name">${esc(item.name)}</div>
    ${item.title?`<div class="endorser-title">${brify(item.title)}</div>`:""}
  </div>`;
}

function endorsementsHTML(cfg){
  const e=cfg.endorsements; if(!e) return "";
  // Exact recreation: navy cards grouped into categories with icons + org logo plates.
  let body="";
  (e.categories||[]).forEach(cat=>{
    body+=`<div class="category-header">${esc(cat.title)}</div>`;
    const items=(cat.items||[]).map(it=>Object.assign({icon:cat.icon},it));
    if(cat.layout==="logos"){
      body+=`<div class="endorsement-grid-bottom">`+items.map(it=>endorsementCard(it,true)).join("")+`</div>`;
      return;
    }
    chunk3(items).forEach(row=>{
      const cls = row.length===1?"endorsement-grid-single":(row.length===2?"endorsement-grid-bottom":"endorsement-grid");
      body+=`<div class="${cls}">`+row.map(it=>endorsementCard(it,false)).join("")+`</div>`;
    });
  });
  return `<section id="endorsements"><div class="endorsements-section">
    ${e.sectionLabel?`<div class="section-label">${esc(e.sectionLabel)}</div>`:""}
    <h2 class="section-title">${esc(e.sectionTitle||"Endorsements")}</h2>
    <hr class="gold-rule">
    ${e.subtitle?`<p class="section-subtitle">${esc(e.subtitle)}</p>`:""}
    ${body}
  </div></section>`;
}

function fieldHTML(f){
  const req=f.required?" required":""; const name=esc(f.name); const label=esc(f.label)+(f.required?" *":"");
  if(f.type==="textarea") return `<div class="field"><label for="${name}">${label}</label><textarea id="${name}" name="${name}"${req}></textarea></div>`;
  if(f.type==="select"){
    const opts=(f.options||[]).map(o=>`<option value="${esc(o)}">${esc(o)}</option>`).join("");
    return `<div class="field"><label for="${name}">${label}</label><select id="${name}" name="${name}"${req}><option value="">Select…</option>${opts}</select></div>`;
  }
  return `<div class="field"><label for="${name}">${label}</label><input type="${esc(f.type||'text')}" id="${name}" name="${name}"${req}/></div>`;
}

function formBlockHTML(key,form){
  const fields=(form.fields||[]).map(fieldHTML).join("");
  return `<div class="form-block" id="form-${esc(key)}">
    <h3>${esc(form.headline||form.sectionTitle||"")}</h3>
    ${form.intro?`<p class="f-intro">${esc(form.intro)}</p>`:""}
    <form name="${esc(form.formName||key)}" method="POST" data-netlify="true" netlify-honeypot="bot-field" onsubmit="return handleFormSubmit(event,'${esc(key)}')">
      <input type="hidden" name="form-name" value="${esc(form.formName||key)}"/>
      <p hidden><label>Don't fill this out: <input name="bot-field"/></label></p>
      ${fields}
      <button class="btn btn-primary" type="submit">${esc(form.submitText||"Submit")}</button>
      <div class="form-success" id="success-${esc(key)}">${esc(form.successMessage||"Thank you!")}</div>
    </form></div>`;
}

function formsHTML(cfg){
  const f=cfg.forms; if(!f) return "";
  const keys=Object.keys(f);
  const first=f[keys[0]]||{};
  const blocks=keys.map(k=>formBlockHTML(k,f[k])).join("");
  return `<section class="section" id="get-involved" style="background:var(--background)"><div class="wrap">
    <div class="forms-head"><div class="eyebrow">${esc(first.sectionTitle||"Get Involved")}</div>
      <h2>${esc(first.pageHeadline||"Join the Campaign")}</h2>${first.pageIntro?`<p>${esc(first.pageIntro)}</p>`:""}</div>
    <div class="forms-grid">${blocks}</div></div></section>`;
}
function handleFormSubmit(e,key){
  e.preventDefault();
  const form=e.target;
  const data=new FormData(form);
  fetch("/",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:new URLSearchParams(data).toString()})
    .then(()=>{document.getElementById("success-"+key).style.display="block";form.reset();})
    .catch(()=>{document.getElementById("success-"+key).style.display="block";form.reset();});
  return false;
}

const SECTION_RENDER={hero:heroHTML,about:aboutHTML,issues:issuesHTML,endorsements:endorsementsHTML};
function renderSections(cfg){
  const main=document.getElementById("top"); let html="";
  const order=cfg.sectionOrder||["hero","about","issues","endorsements","volunteer","contact"];
  let formsDone=false;
  order.forEach(key=>{
    if(key==="volunteer"||key==="contact"){ if(!formsDone){html+=formsHTML(cfg);formsDone=true;} return; }
    const fn=SECTION_RENDER[key]; if(fn) html+=fn(cfg);
  });
  main.innerHTML=html;
}

function renderFooter(cfg){
  const f=cfg.footer||{}, soc=cfg.social||{};
  const socIcons={facebook:"Facebook",instagram:"Instagram",twitter:"X",tiktok:"TikTok",youtube:"YouTube"};
  const socHTML=Object.keys(socIcons).filter(k=>soc[k]).map(k=>`<a href="${esc(soc[k])}" target="_blank" rel="noopener">${socIcons[k]}</a>`).join("");
  const links=(f.extraLinks||[]).map(l=>`<a href="${esc(l.href)}">${esc(l.label)}</a>`).join("");
  document.getElementById("footer").innerHTML=`<div class="wrap"><div class="foot-grid">
    <div><div class="foot-brand">${esc(cfg.site.candidateName||"")}</div>
      <div>${esc(cfg.site.office||"")}</div>
      ${f.email?`<div style="margin-top:.6rem"><a href="mailto:${esc(f.email)}">${esc(f.email)}</a></div>`:""}
      ${socHTML?`<div class="foot-social">${socHTML}</div>`:""}
    </div>
    <div style="text-align:right">
      ${cfg.nav&&cfg.nav.ctaText?`<a class="btn btn-primary" href="${esc(cfg.nav.ctaLink||'#')}" target="_blank" rel="noopener">${esc(cfg.nav.ctaText)}</a>`:""}
      <div class="foot-links">${links}</div>
    </div></div>
    <div class="foot-legal">${esc(f.paidFor||"")}${f.disclaimer?"<br/>"+esc(f.disclaimer):""}</div>
  </div>`;
}

function boot(cfg){
  document.title=(cfg.site.candidateName?cfg.site.candidateName+" | ":"")+(cfg.site.office||"");
  const md=document.querySelector('meta[name="description"]'); if(md)md.content=cfg.site.metaDescription||"";
  applyStyle(cfg); renderNav(cfg); renderSections(cfg); renderFooter(cfg);
}

fetch("site-config.json").then(r=>r.json()).then(boot).catch(err=>{
  document.getElementById("top").innerHTML='<div style="padding:8rem 2rem;text-align:center;font-family:sans-serif"><h1>Config not found</h1><p>Run this site from a local server or deploy so <code>site-config.json</code> can load.</p></div>';
  console.error(err);
});
</script>
